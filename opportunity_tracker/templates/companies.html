{% extends 'base_vertical.html' %}

{% block content %}
    <div class="companies-list">
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>Company Name</th>
                    <th>Open Opportunites</th>
                </tr>
            </thead>
            <tbody>
                {% for company in companies %}
                    <tr>
                        <td>{{ company.name }}</td>
                        <td>{{ company.in_play }}</td>
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="2">No companies available.</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
