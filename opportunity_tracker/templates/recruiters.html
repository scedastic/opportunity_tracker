{% extends "base.html" %} {% block content %}
        
    <div class="row">
        <div class="col"></div>
        <div class="col text-right">
            <a class="btn btn-sm btn-primary mb-1" href="{% url 'add-opportunity' %}">Add</a>
        </div>
    </div>
    <div class="table-border table-wrapper-scroll-y my-custom-scrollbar">
        <table class="table table-striped table-bordered dt-responsive nowrap mb-0">
            <thead>
                <th>Recruiter Name</th>
            </thead>
            <tbody>
                {% for c in contacts %}
                <tr>
                    <td>{{ c.name }}</td>
                    <td><a href="{% url 'opportunity_view' c.opportunity.id %}">{{ c.opportunity.company_name }}</a> </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endblock %}
