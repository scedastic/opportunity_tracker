{% extends "base_vertical.html" %} {% block content %} 
    <div class="table-wrapper-scroll-y my-custom-scrollbar">

        <table class="table table-striped table-bordered dt-responsive nowrap mb-0">
            <thead>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Follow Up</th>
            </thead>
            <tbody>
                {% for c in contacts %}
                <tr>
                    <td><a href="{% url 'contact-view' c.id %}">{{ c.name }}</a></td>
                    <td>{{ c.phone }}</td>
                    <td>{{ c.email }}</td>
                    <td>
                        <form method="post" action="{% url 'add-follow-up-to-contact' c.id %}" class="d-flex align-items-center">
                            {% csrf_token %}
                            <input type="date" name="follow_up_date" class="form-control form-control-sm mr-2" value="{{ today|date:'Y-m-d' }}">
                            <button type="submit" class="btn btn-sm btn-outline-primary">Follow Up</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endblock %}
